<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور الذكي - دكتور المحاضرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 5px solid var(--primary); }
        h2 { color: var(--primary); margin-bottom: 0.5rem; }
        .status-box { padding: 15px; border-radius: 12px; margin-bottom: 1.5rem; font-weight: bold; border: 1px solid #ddd; }
        input { width: 100%; padding: 14px; margin: 15px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; text-align: center; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #checkBtn { background-color: var(--primary); color: white; }
        #submitBtn { background-color: var(--success); color: white; display: none; }
        .success { color: var(--success); background: #f5fff8; border-color: var(--success); }
        .error { color: var(--danger); background: #fff5f5; border-color: var(--danger); }
        
        /* تصميم لوحة التحكم */
        #adminPanel { display: none; margin-top: 30px; text-align: right; width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: var(--primary); color: white; }
        .export-btn { background-color: #e67e22; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="mainApp" class="container">
    <h2>نظام تسجيل الحضور</h2>
    <div id="msg" class="status-box">يرجى الضغط للتحقق من موقعك بالقاعة</div>
    <button id="checkBtn">1. التحقق من الموقع (GPS)</button>

    <div id="attendanceForm" style="display: none;">
        <input type="number" id="nationalID" placeholder="أدخل الرقم القومي (14 رقم)">
        <button id="submitBtn">2. تسجيل الحضور الآن</button>
    </div>
</div>

<div id="adminPanel">
    <h3>لوحة تحكم المحاضر</h3>
    <button class="export-btn" id="exportBtn">تصدير الكشف إلى Excel</button>
    <table id="attendanceTable">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الرقم القومي</th>
                <th>وقت الحضور</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
    <button onclick="location.reload()" style="background:#95a5a6; color:white;">خروج</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, getDocs, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDop8Wf6OwdJIIJL5cEav23gsDRPbornKY",
        authDomain: "attendancesystem-cc4ee.firebaseapp.com",
        projectId: "attendancesystem-cc4ee",
        storageBucket: "attendancesystem-cc4ee.firebasestorage.app",
        messagingSenderId: "186115847052",
        appId: "1:186115847052:web:daf80d00c3c2ef2a49dca9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- إعدادات المدير والموقع ---
    const ADMIN_ID = "29112063100031"; // *** ضع رقمك القومي هنا يا دكتور ***
    const TARGET_LAT = 26.7307244; 
    const TARGET_LON = 33.9358019; 
    const RADIUS_METERS = 100;
    // ----------------------------

    const msg = document.getElementById('msg');
    const checkBtn = document.getElementById('checkBtn');
    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');

    checkBtn.onclick = () => {
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LON);
            if (dist <= RADIUS_METERS) {
                msg.innerText = "تم التحقق من الموقع بنجاح";
                msg.className = "status-box success";
                checkBtn.style.display = "none";
                form.style.display = "block";
                submitBtn.style.display = "block";
            } else {
                msg.innerText = `أنت خارج النطاق بمسافة ${Math.round(dist)} متر`;
                msg.className = "status-box error";
            }
        }, () => alert("يرجى تفعيل الـ GPS"));
    };

    submitBtn.onclick = async () => {
        const idValue = document.getElementById('nationalID').value;
        if (idValue.length !== 14) return alert("الرقم القومي غير صحيح");

        // إذا كان الداخل هو المدير
        if (idValue === ADMIN_ID) {
            loadAdminPanel();
            return;
        }

        try {
            submitBtn.disabled = true;
            const studentSnap = await getDoc(doc(db, "StudentsList", idValue));
            if (studentSnap.exists()) {
                await addDoc(collection(db, "Attendance"), {
                    nationalID: idValue,
                    name: studentSnap.data().name,
                    timestamp: serverTimestamp()
                });
                alert("تم تسجيل حضورك بنجاح");
                location.reload();
            } else {
                alert("الرقم غير مسجل في قائمة الطلاب");
                submitBtn.disabled = false;
            }
        } catch (e) { alert("خطأ في الاتصال"); submitBtn.disabled = false; }
    };

    async function loadAdminPanel() {
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        const q = query(collection(db, "Attendance"), orderBy("timestamp", "desc"));
        const querySnapshot = await getDocs(q);
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const date = data.timestamp ? data.timestamp.toDate().toLocaleString('ar-EG') : 'جاري المعالجة';
            tbody.innerHTML += `<tr><td>${data.name}</td><td>${data.nationalID}</td><td>${date}</td></tr>`;
        });
    }

    document.getElementById('exportBtn').onclick = () => {
        const table = document.getElementById("attendanceTable");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "كشف_الحضور.xlsx");
    };

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dPhi = (lat2-lat1) * Math.PI/180;
        const dLambda = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLambda/2)*Math.sin(dLambda/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
