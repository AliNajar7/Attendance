<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الحضور الذكي</title>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: var(--primary); margin-bottom: 1.5rem; }
        .status-box { padding: 15px; border-radius: 8px; margin-bottom: 1.5rem; font-weight: bold; font-size: 0.9rem; border: 1px solid #eee; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #checkBtn { background-color: var(--primary); color: white; }
        #submitBtn { background-color: var(--success); color: white; display: none; }
        .error { color: var(--danger); background: #fdf2f2; border-color: var(--danger); }
        .success { color: var(--success); background: #f2fdf5; border-color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h2>تسجيل الحضور</h2>
    <div id="msg" class="status-box">اضغط للتحقق من وجودك في نطاق القاعة</div>
    <button id="checkBtn">1. التحقق من الموقع (GPS)</button>

    <div id="attendanceForm" style="display: none;">
        <hr>
        <p style="font-size: 0.8rem; color: #666;">تم التحقق من موقعك، أدخل بياناتك:</p>
        <input type="number" id="nationalID" placeholder="أدخل الرقم القومي (14 رقم)">
        <button id="submitBtn">2. تسجيل الحضور الآن</button>
    </div>
</div>

<script type="module">
    // استيراد مكتبات Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // إعدادات مشروعك التي أرسلتها
    const firebaseConfig = {
        apiKey: "AIzaSyDop8Wf6OwdJIIJL5cEav23gsDRPbornKY",
        authDomain: "attendancesystem-cc4ee.firebaseapp.com",
        projectId: "attendancesystem-cc4ee",
        storageBucket: "attendancesystem-cc4ee.firebasestorage.app",
        messagingSenderId: "186115847052",
        appId: "1:186115847052:web:daf80d00c3c2ef2a49dca9",
        measurementId: "G-JNQ5DW74MK"
    };

    // تشغيل Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // إعدادات الموقع الجغرافي (إحداثياتك الحالية)
    const TARGET_LAT = 26.7307244; 
    const TARGET_LON = 33.9358019; 
    const RADIUS_METERS = 100;

    const msg = document.getElementById('msg');
    const checkBtn = document.getElementById('checkBtn');
    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');

    // وظيفة تحديد الموقع
    checkBtn.addEventListener('click', () => {
        if (navigator.geolocation) {
            msg.innerText = "جاري تحديد موقعك...";
            navigator.geolocation.getCurrentPosition(processPosition, handleError, {
                enableHighAccuracy: true
            });
        } else {
            msg.innerText = "متصفحك لا يدعم تحديد الموقع.";
        }
    });

    function processPosition(position) {
        const uLat = position.coords.latitude;
        const uLon = position.coords.longitude;
        const distance = calculateDistance(uLat, uLon, TARGET_LAT, TARGET_LON);
        
        if (distance <= RADIUS_METERS) {
            msg.innerText = "تم التحقق! أنت داخل النطاق المسموح.";
            msg.className = "status-box success";
            checkBtn.style.display = "none";
            form.style.display = "block";
            submitBtn.style.display = "block";
        } else {
            msg.innerText = `عذراً، أنت بعيد بمسافة ${Math.round(distance)} متر.`;
            msg.className = "status-box error";
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dPhi = (lat2-lat1) * Math.PI/180;
        const dLambda = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) +
                  Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
                  Math.sin(dLambda/2) * Math.sin(dLambda/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function handleError() { msg.innerText = "يرجى تفعيل الـ GPS والسماح للمتصفح بالوصول لموقعك."; }

    // وظيفة إرسال الحضور لقاعدة البيانات
    submitBtn.addEventListener('click', async () => {
        const idValue = document.getElementById('nationalID').value;
        
        if (idValue.length !== 14) {
            alert("خطأ: الرقم القومي يجب أن يكون 14 رقماً.");
            return;
        }

        try {
            submitBtn.disabled = true;
            submitBtn.innerText = "جاري الإرسال...";
            
            // إرسال البيانات لمجموعة تسمى "Attendance"
            await addDoc(collection(db, "Attendance"), {
                nationalID: idValue,
                timestamp: serverTimestamp(),
                location_status: "Verified_In_Range"
            });

            alert("تم تسجيل حضورك بنجاح يا دكتور!");
            location.reload(); // إعادة تحميل الصفحة
        } catch (e) {
            console.error("Error adding document: ", e);
            alert("حدث خطأ أثناء الإرسال، تأكد من إعدادات Firestore (Rules).");
            submitBtn.disabled = false;
            submitBtn.innerText = "حاول مرة أخرى";
        }
    });
</script>
</body>
</html>
