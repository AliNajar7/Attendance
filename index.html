<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور الذكي | دكتور المحاضرة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --accent: #3498db; --warning: #f39c12; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; border-top: 6px solid var(--primary); position: relative; }
        h2 { color: var(--primary); margin-top: 0; }
        .status-box { padding: 15px; border-radius: 12px; margin-bottom: 1.5rem; font-weight: bold; border: 1px solid #ddd; font-size: 0.95rem; }
        input[type="number"], input[type="file"] { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1.1rem; text-align: center; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; color: white; }
        .btn-check { background-color: var(--primary); }
        .btn-submit { background-color: var(--success); display: none; }
        .btn-export { background-color: var(--accent); width: auto; padding: 8px 20px; }
        .btn-clear { background-color: var(--danger); margin-top: 20px; }
        .btn-upload { background-color: var(--warning); }
        .success { color: var(--success); background: #f5fff8; border-color: var(--success); }
        .error { color: var(--danger); background: #fff5f5; border-color: var(--danger); }

        /* ستايل عرض اسم الطالب بعد التسجيل */
        #resultDisplay { display: none; margin-top: 20px; padding: 20px; border-radius: 15px; background: #ebf5fb; border: 1px solid var(--accent); }
        .welcome-msg { color: #34495e; font-size: 1.1rem; }
        .student-name { display: block; color: var(--success); font-size: 1.8rem; font-weight: 800; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        #adminPanel { display: none; max-width: 900px; width: 100%; }
        .admin-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-top: 20px; text-align: right; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; }
        .upload-section { border: 2px dashed #ddd; padding: 20px; margin: 20px 0; border-radius: 10px; background: #fafafa; }
        
        /* Modal بسيط للرسائل */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 15px; width: 80%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div id="studentUI" class="card">
    <h2>نظام الحضور الذكي</h2>
    <p style="color: #7f8c8d; font-size: 0.85rem;">كلية التربية النوعية - جامعة جنوب الوادي</p>
    
    <div id="msg" class="status-box">يرجى التحقق من موقعك بالقاعة أولاً</div>
    
    <button id="checkBtn" class="btn-check">1. التحقق من الموقع (GPS)</button>

    <div id="attendanceForm" style="display: none;">
        <input type="number" id="nationalID" placeholder="أدخل الرقم القومي (14 رقم)">
        <button id="submitBtn" class="btn-submit">2. تسجيل الحضور الآن</button>
    </div>

    <div id="resultDisplay">
        <div class="welcome-msg">تم تسجيل الحضور بنجاح</div>
        <span id="displayStudentName" class="student-name"></span>
        <button onclick="location.reload()" style="background: var(--primary);">خروج</button>
    </div>
</div>

<div id="adminPanel">
    <div class="admin-card">
        <h2 style="text-align: center;">لوحة تحكم المحاضر 👨‍🏫</h2>
        <div class="upload-section">
            <strong>📦 رفع كشف الطلاب (Excel):</strong>
            <input type="file" id="excelFile" accept=".xlsx, .xls">
            <button id="uploadBtn" class="btn-upload">بدء الرفع الجماعي</button>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <strong>📊 سجل الحضور الحالي:</strong>
            <button id="exportBtn" class="btn-export">تصدير Excel</button>
        </div>
        <table id="attendanceTable">
            <thead>
                <tr><th>الاسم</th><th>الرقم القومي</th><th>التوقيت</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button id="clearAllBtn" class="btn-clear">🗑️ مسح جميع السجلات</button>
        <button onclick="location.reload()" style="background:#95a5a6; margin-top:10px;">تسجيل الخروج</button>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <p id="modalMsg"></p>
        <button onclick="closeModal()" style="background: var(--accent);">حسناً</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDoc, getDocs, doc, serverTimestamp, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDop8Wf6OwdJIIJL5cEav23gsDRPbornKY",
        authDomain: "attendancesystem-cc4ee.firebaseapp.com",
        projectId: "attendancesystem-cc4ee",
        storageBucket: "attendancesystem-cc4ee.firebasestorage.app",
        messagingSenderId: "186115847052",
        appId: "1:186115847052:web:daf80d00c3c2ef2a49dca9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- إعدادات المدير والموقع ---
    const ADMIN_ID = "12345678901234"; // رقمك القومي
    const TARGET_LAT = 26.7307244; 
    const TARGET_LON = 33.9358019; 
    const RADIUS_METERS = 100;

    const msg = document.getElementById('msg');
    const checkBtn = document.getElementById('checkBtn');
    const form = document.getElementById('attendanceForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const displayStudentName = document.getElementById('displayStudentName');

    // دالة بديلة للـ Alert
    window.showCustomMsg = (text) => {
        document.getElementById('modalMsg').innerText = text;
        document.getElementById('myModal').style.display = "block";
    };
    window.closeModal = () => document.getElementById('myModal').style.display = "none";

    checkBtn.onclick = () => {
        navigator.geolocation.getCurrentPosition((pos) => {
            const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, TARGET_LAT, TARGET_LON);
            if (dist <= RADIUS_METERS) {
                msg.innerText = "تم التحقق من الموقع بنجاح ✅";
                msg.className = "status-box success";
                checkBtn.style.display = "none";
                form.style.display = "block";
                submitBtn.style.display = "block";
            } else {
                msg.innerText = `أنت بعيد عن القاعة بمسافة ${Math.round(dist)} متر ❌`;
                msg.className = "status-box error";
            }
        }, () => showCustomMsg("يرجى تفعيل الـ GPS"));
    };

    submitBtn.onclick = async () => {
        const idValue = document.getElementById('nationalID').value.trim();
        if (idValue.length !== 14) return showCustomMsg("الرقم القومي يجب أن يكون 14 رقماً");

        if (idValue === ADMIN_ID) {
            loadAdminPanel();
            return;
        }

        try {
            submitBtn.disabled = true;
            const studentSnap = await getDoc(doc(db, "StudentsList", idValue));
            if (studentSnap.exists()) {
                const sName = studentSnap.data().name;
                await addDoc(collection(db, "Attendance"), {
                    nationalID: idValue,
                    name: sName,
                    timestamp: serverTimestamp()
                });
                // إظهار الاسم بشكل بارز بدلاً من الـ alert
                form.style.display = "none";
                msg.style.display = "none";
                displayStudentName.innerText = sName;
                resultDisplay.style.display = "block";
            } else {
                showCustomMsg("الرقم غير مسجل في قائمة الطلاب.");
                submitBtn.disabled = false;
            }
        } catch (e) { showCustomMsg("خطأ في الاتصال بقاعدة البيانات"); submitBtn.disabled = false; }
    };

    async function loadAdminPanel() {
        document.getElementById('studentUI').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        const q = query(collection(db, "Attendance"), orderBy("timestamp", "desc"));
        const snap = await getDocs(q);
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            const time = d.timestamp ? d.timestamp.toDate().toLocaleString('ar-EG') : '...';
            tbody.innerHTML += `<tr><td>${d.name}</td><td>${d.nationalID}</td><td>${time}</td></tr>`;
        });
    }

    document.getElementById('uploadBtn').onclick = () => {
        const file = document.getElementById('excelFile').files[0];
        if (!file) return showCustomMsg("اختر ملف Excel أولاً");
        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            const batch = writeBatch(db);
            let count = 0;
            jsonData.forEach(row => {
                const id = row.ID || row.id || row["الرقم القومي"] || row["رقم"];
                const name = row.Name || row.name || row["الاسم"] || row["اسم الطالب"];
                if(id && name) {
                    batch.set(doc(db, "StudentsList", String(id).trim()), { name: String(name).trim() });
                    count++;
                }
            });
            await batch.commit();
            showCustomMsg(`تم رفع ${count} طالب بنجاح!`);
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('exportBtn').onclick = () => {
        const wb = XLSX.utils.table_to_book(document.getElementById("attendanceTable"));
        XLSX.writeFile(wb, "تقرير_الحضور.xlsx");
    };

    document.getElementById('clearAllBtn').onclick = async () => {
        // استبدال confirm بـ modal مخصص قد يكون معقداً، سنبقيها حالياً للأمان
        if (!confirm("هل أنت متأكد من حذف كل السجلات؟")) return;
        const snap = await getDocs(collection(db, "Attendance"));
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        loadAdminPanel();
    };

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
